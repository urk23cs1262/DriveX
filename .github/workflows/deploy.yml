name: Build & Deploy to Minikube

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Point Docker CLI to Minikube's Docker daemon ────────────────
      - name: Configure Minikube Docker environment
        shell: powershell
        run: |
          # Parse minikube docker-env (plain KEY=VALUE format) and export to GITHUB_ENV
          $lines = minikube -p minikube docker-env --shell none
          foreach ($line in $lines) {
            $line = $line.Trim()
            # Skip empty lines and comments
            if ($line -eq "" -or $line.StartsWith("#")) { continue }
            # Parse KEY=VALUE
            $eqIndex = $line.IndexOf("=")
            if ($eqIndex -gt 0) {
              $key = $line.Substring(0, $eqIndex)
              $value = $line.Substring($eqIndex + 1)
              # Set for current step
              [System.Environment]::SetEnvironmentVariable($key, $value, "Process")
              # Export for subsequent steps
              echo "$key=$value" >> $env:GITHUB_ENV
            }
          }
          Write-Host "Docker environment configured for Minikube"
          docker info --format '{{.Name}}'

      # ── 3. Build Docker images inside Minikube ─────────────────────────
      - name: Build server image
        shell: powershell
        run: docker build -t drivex-server:latest ./server

      - name: Build client image
        shell: powershell
        run: docker build -t drivex-client:latest ./client

      # ── 4. Deploy to Minikube ──────────────────────────────────────────
      - name: Apply Kubernetes manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/mongo.yml
          kubectl apply -f k8s/server.yml
          kubectl apply -f k8s/client.yml

      # ── 5. Wait for MongoDB to be ready first ─────────────────────────
      - name: Wait for MongoDB
        shell: powershell
        run: |
          kubectl rollout status deployment/mongo -n drivex --timeout=120s

      # ── 6. Restart server & client to pick up fresh images ─────────────
      - name: Rollout restart deployments
        shell: powershell
        run: |
          kubectl rollout restart deployment/server -n drivex
          kubectl rollout restart deployment/client -n drivex

      # ── 7. Wait for all deployments to be ready ────────────────────────
      - name: Wait for deployments to be ready
        shell: powershell
        run: |
          kubectl rollout status deployment/server -n drivex --timeout=120s
          kubectl rollout status deployment/client -n drivex --timeout=120s

      # ── 8. Show deployment status ─────────────────────────────────────
      - name: Show deployment status
        shell: powershell
        run: |
          Write-Host "============================================"
          Write-Host "         DriveX Deployment Status"
          Write-Host "============================================"
          kubectl get all -n drivex
          Write-Host ""
          Write-Host "============================================"
          Write-Host "  Run 'minikube tunnel' to access the app"
          Write-Host "  Then open: http://localhost"
          Write-Host "============================================"
