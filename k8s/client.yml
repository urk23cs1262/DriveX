apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: drivex
  labels:
    app: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: drivex-client:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: drivex
  labels:
    app: client
spec:
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
